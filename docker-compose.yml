# ═══════════════════════════════════════════════════════════
# Enjaz Platform — Docker Compose (Core-A Infrastructure)
# Version: 1.0 | Phase: Core-A M1
# ═══════════════════════════════════════════════════════════

services:
  # ─────────────────────────────────────────────
  # PostgreSQL 16 — Primary Database
  # ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: enjaz-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: enjaz
      POSTGRES_USER: enjaz_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enjaz_user -d enjaz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    secrets:
      - db_password
    deploy:
      resources:
        limits:
          memory: 512M

  # ─────────────────────────────────────────────
  # Redis 7 — Cache + Rate Limiting + Idempotency
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: enjaz-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 300M

# ─────────────────────────────────────────────
# Secrets (file-based, not .env)
# ─────────────────────────────────────────────
secrets:
  db_password:
    file: ./secrets/db_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt

# ─────────────────────────────────────────────
# Persistent Volumes
# ─────────────────────────────────────────────
volumes:
  pgdata:
    name: enjaz-pgdata
  redis-data:
    name: enjaz-redis-data
