# ═══════════════════════════════════════════════
# Stability M6: CI/CD Pipeline — 4-Stage
# ═══════════════════════════════════════════════
# Stage 1: Build + Restore
# Stage 2: Test (36 unit tests)
# Stage 3: Security Scan (dependencies)
# Stage 4: Docker Build (staging-ready)

name: ENJAZ CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.x'

jobs:
  # ═══════════════════════════════════════
  # Stage 1: Build
  # ═══════════════════════════════════════
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Restore Backend
        run: dotnet restore backend/backend.csproj

      - name: Build Backend
        run: dotnet build backend/backend.csproj --no-restore -c Release

      - name: Install Frontend
        run: npm ci
        working-directory: frontend

      - name: Build Frontend
        run: npm run build
        working-directory: frontend

  # ═══════════════════════════════════════
  # Stage 2: Test
  # ═══════════════════════════════════════
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore Test Project
        run: dotnet restore backend.tests/backend.tests.csproj

      - name: Run Tests
        run: dotnet test backend.tests/backend.tests.csproj --no-restore --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: backend.tests/TestResults/

  # ═══════════════════════════════════════
  # Stage 3: Security Scan
  # ═══════════════════════════════════════
  security:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore backend/backend.csproj

      - name: Check Vulnerabilities
        run: dotnet list backend/backend.csproj package --vulnerable --include-transitive

      - name: NPM Audit
        run: npm audit --production || true
        working-directory: frontend

  # ═══════════════════════════════════════
  # Stage 4: Docker Build (main only)
  # ═══════════════════════════════════════
  docker:
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t enjaz-api:${{ github.sha }} -f backend/Dockerfile backend/

      - name: Tag Latest
        run: docker tag enjaz-api:${{ github.sha }} enjaz-api:latest
