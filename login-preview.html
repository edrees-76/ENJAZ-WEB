<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنجاز ويب | واجهة 3D المزدوجة</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0ea5e9',   // Sky 500
                        secondary: '#0284c7', // Sky 600
                        accent: '#e0f2fe',    // Sky 100
                        deepblue: '#0369a1',  // Sky 700
                        corporate: '#075985', // Sky 800
                    },
                    fontFamily: {
                        cairo: ['Cairo', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            --card-bg: rgba(224, 242, 254, 0.65);
            --card-border: rgba(255, 255, 255, 0.8);
            --text-main: #075985;
            --input-bg: rgba(255, 255, 255, 0.5);
            --input-text: #0369a1;
            --input-border: rgba(14, 165, 233, 0.2);
            --sphere-opacity: 0.1;
            --credit-color: #075985;
        }

        .dark {
            --bg-grad: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: rgba(15, 23, 42, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #e2e8f0;
            --input-bg: rgba(30, 41, 59, 0.5);
            --input-text: #f1f5f9;
            --input-border: rgba(255, 255, 255, 0.1);
            --sphere-opacity: 0.2;
            --credit-color: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background 0.5s ease, color 0.5s ease, border-color 0.5s ease;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-grad) fixed;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 2500px;
        }

        /* --- Ambient 3D Background --- */
        .world {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .floating-sphere {
            position: absolute;
            border-radius: 50%;
            background: #0ea5e9;
            opacity: var(--sphere-opacity);
            filter: blur(50px);
            animation: float-around 25s infinite ease-in-out;
        }
        .s-1 { width: 500px; height: 500px; top: -10%; left: -5%; }
        .s-2 { width: 400px; height: 400px; bottom: -5%; right: -5%; }

        @keyframes float-around {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(100px, 80px) scale(1.1); }
        }

        /* --- 3D Glass Card --- */
        #tiltContainer {
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            will-change: transform;
            width: 90%;
            max-width: 820px;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 2px solid var(--card-border);
            border-radius: 3.5rem;
            box-shadow: 0 50px 120px rgba(0, 0, 0, 0.4);
            transform-style: preserve-3d;
            padding: 3rem;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 4rem;
            position: relative;
        }

        /* --- LUXURY SWITCH --- */
        .theme-switch-container {
            position: absolute;
            top: 2rem;
            left: 2.5rem;
            z-index: 100;
            transform: translateZ(100px);
        }

        .theme-switch {
            width: 70px;
            height: 34px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .theme-switch::after {
            content: "☀️";
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            position: absolute;
            top: 3px;
            left: 4px;
            width: 26px;
            height: 26px;
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            border-radius: 50%;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .dark .theme-switch::after {
            left: 38px;
            content: "🌙";
            background: linear-gradient(135deg, #64748b, #1e293b);
        }

        .dark .theme-switch {
            background: rgba(15, 23, 42, 0.6);
            border-color: rgba(14, 165, 233, 0.4);
        }

        /* --- 3D Elements --- */
        .logo-container {
            width: 35%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform: translateZ(80px);
        }

        .logo-3d {
            width: 200px;
            animation: logo-hover 5s infinite ease-in-out;
            filter: drop-shadow(0 30px 40px rgba(0,0,0,0.3));
        }

        @keyframes logo-hover {
            0%, 100% { transform: translateY(0) rotateY(0); }
            50% { transform: translateY(-20px) rotateY(15deg); }
        }

        .form-section {
            width: 65%;
            border-right: 1px solid rgba(14, 165, 233, 0.15);
            padding-right: 4rem;
            transform: translateZ(50px);
        }

        /* --- Form Elements --- */
        .glass-input {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--input-text);
            transition: all 0.3s ease;
        }

        .glass-input:focus {
            background: var(--input-bg); /* منع التحول للون الأبيض الساطع */
            border-color: #0ea5e9;
            box-shadow: 0 10px 25px rgba(14, 165, 233, 0.15);
            transform: translateZ(10px);
        }

        .primary-btn {
            background: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%);
            box-shadow: 0 20px 40px rgba(14, 165, 233, 0.3);
            color: white;
            transition: all 0.4s ease;
        }

        .primary-btn:hover {
            transform: translateZ(30px) scale(1.02);
            box-shadow: 0 30px 60px rgba(14, 165, 233, 0.4);
        }

        .divider {
            height: 2px;
            width: 100px;
            background: linear-gradient(90deg, transparent, #0ea5e9, transparent);
            margin: 1.5rem 0;
            opacity: 0.5;
        }

        h2, label, .credit-p { color: var(--text-main); }
        .credit-p { color: var(--credit-color); }

        @media (max-width: 850px) {
            .glass-card { flex-direction: column; gap: 2rem; padding: 2.5rem; text-align: center; }
            .logo-container, .form-section { width: 100%; border-right: none; padding-right: 0; }
            .theme-switch-container { top: 1rem; left: 1.5rem; }
        }
    </style>
</head>
<body class="dir-rtl">

    <div class="world">
        <div class="floating-sphere s-1"></div>
        <div class="floating-sphere s-2"></div>
    </div>

    <div id="tiltWrapper" class="flex justify-center w-full">
        <div id="tiltContainer">
            <div class="glass-card">
                
                <!-- LUXURY THEME SWITCH -->
                <div class="theme-switch-container" title="تبديل الوضع">
                    <div class="theme-switch" id="themeToggle"></div>
                </div>

                <!-- 3D Logo -->
                <div class="logo-container">
                    <img src="assets/logo.png" alt="Logo" class="logo-3d" onerror="this.src='https://ui-avatars.com/api/?name=Enjaz+Web&background=e0f2fe&color=0ea5e9&size=200'">
                    <div class="divider"></div>
                </div>

                <!-- Form -->
                <div class="form-section">
                    <form onsubmit="event.preventDefault();" class="text-right">
                        <h2 class="text-3xl font-extrabold mb-8">تسجيل الدخول</h2>
                        
                        <div class="mb-5">
                            <label class="block text-xs font-bold mb-2">اسم المستخدم</label>
                            <input type="text" class="glass-input w-full py-4 px-6 rounded-2xl outline-none" placeholder="اسم المستخدم">
                        </div>

                        <div class="mb-5">
                            <label class="block text-xs font-bold mb-2">كلمة المرور</label>
                            <div class="relative">
                                <input type="password" id="passwordInput" class="glass-input w-full py-4 px-6 rounded-2xl outline-none" placeholder="••••••••">
                                <button type="button" id="togglePasswordBtn" class="absolute left-6 top-1/2 -translate-y-1/2 text-primary/50">
                                    <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                                </button>
                            </div>
                        </div>

                        <div class="flex justify-between items-center mb-10">
                            <label class="flex items-center space-x-2 space-x-reverse cursor-pointer">
                                <input type="checkbox" class="w-4 h-4 rounded-lg bg-white/20">
                                <span class="text-xs font-semibold opacity-70">تذكرني</span>
                            </label>
                        </div>

                        <button type="button" class="primary-btn w-full py-4 rounded-2xl font-bold text-lg">
                            دخول بالمنظومة
                        </button>

                        <div class="mt-8 pt-4 border-t border-primary/10 opacity-80 text-center">
                            <p class="text-[11px] font-bold italic credit-p">
                                تصميم وتنفيذ م . ادريس فتح الله الهرى
                            </p>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <script>
        const body = document.body;
        const themeBtn = document.getElementById('themeToggle');
        const card = document.getElementById('tiltContainer');
        const pwdInput = document.getElementById('passwordInput');
        const toggleBtn = document.getElementById('togglePasswordBtn');
        const eyeIcon = document.getElementById('eyeIcon');

        // --- Theme Logic ---
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') body.classList.add('dark');

        themeBtn.addEventListener('click', () => {
            const isDark = body.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        // --- 3D Tilt ---
        document.addEventListener('mousemove', (e) => {
            const { clientX, clientY } = e;
            const x = (clientY / window.innerHeight - 0.5) * 12;
            const y = (clientX / window.innerWidth - 0.5) * -12;
            card.style.transform = `rotateX(${x}deg) rotateY(${y}deg)`;
        });

        // --- Pass Toggle ---
        toggleBtn.addEventListener('click', () => {
            const isPass = pwdInput.type === 'password';
            pwdInput.type = isPass ? 'text' : 'password';
            eyeIcon.innerHTML = isPass ? 
                `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18"></path>` :
                `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>`;
        });
    </script>
</body>
</html>
